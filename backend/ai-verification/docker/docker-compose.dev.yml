# docker/docker-compose.dev.yml
# Spins up Redis (Celery broker + result backend) for local development.
# Usage:  docker compose -f docker/docker-compose.dev.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: ai_verify_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Celery Flower monitoring UI at http://localhost:5555
  flower:
    image: mher/flower:2.0
    container_name: ai_verify_flower
    command: celery flower --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
